name: Dark Web Ingester
on:
  schedule: [{cron: "0 */6 * * *"}]
jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y tor && sudo tor &
      - run: pip install requests[socks] && python darkweb_ingester.py
      - run: pip install chromadb sentence-transformers && python unified_rag.py --index
