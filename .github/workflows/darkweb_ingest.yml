name: Dark Web Ingester
on:
  schedule:
    - cron: "0 */6 * * *"   # প্রতি ৬ ঘণ্টা পর
  workflow_dispatch:         # ম্যানুয়ালি রান করার জন্য

permissions:
  contents: write            # গিট পুশের জন্য দরকার

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30      # নিরাপদ সময়সীমা

    steps:
      - uses: actions/checkout@v4

      - name: Setup Tor Proxy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tor torsocks
          sudo tor &
          # টর পুরোপুরি চালু না হওয়া পর্যন্ত ২৫ সেকেন্ড অপেক্ষা (GitHub Actions-এ বেশি সময় লাগে)
          sleep 25
          # টর সঠিকভাবে চালু আছে কিনা চেক
          echo "Testing Tor connection..."
          torsocks curl -s -o /dev/null -w "Tor status: %{http_code}\n" http://darkfailllnkf4vf.onion || echo "⚠️ Tor not ready yet"
          echo "Tor setup complete"

      - name: Install Python Dependencies
        run: pip install requests[socks] chromadb sentence-transformers beautifulsoup4

      - name: Run Dark Web Ingester
        run: python darkweb_ingester.py

      - name: Index New Data into ChromaDB
        run: python unified_rag.py --index

      - name: Commit & Push New Data
        run: |
          git config user.name 'Nobab_AI_Bot'
          git config user.email 'bot@nobab.ai'
          git add datasets/raw_darkweb/
          if git diff --staged --quiet; then
            echo "ℹ️ কোনো নতুন ডেটা নেই"
          else
            git commit -m "🌐 Dark web data batch $(date +%Y-%m-%d)"
            git push
          fi
