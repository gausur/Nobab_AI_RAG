name: Dark Web Ingester
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Python Dependencies
        run: pip install requests chromadb sentence-transformers beautifulsoup4

      - name: Run Dark Web Ingester (Tor2Web Gateway)
        run: python darkweb_ingester.py

      - name: Index New Data into ChromaDB
        run: python unified_rag.py --index

      - name: Commit & Push New Data
        run: |
          git config user.name 'Nobab_AI_Bot'
          git config user.email 'bot@nobab.ai'
          git add datasets/raw_darkweb/
          if git diff --staged --quiet; then
            echo "ℹ️ No new data"
          else
            git commit -m "🌐 Dark web data batch $(date +%Y-%m-%d)"
            git push
          fi
