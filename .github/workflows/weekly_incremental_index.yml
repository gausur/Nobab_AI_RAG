name: Weekly Incremental Index
permissions:
  contents: write
on:
  schedule:
    - cron: '0 0 * * 0'   # প্রতি রবিবার রাত ০০:০০ UTC
  workflow_dispatch:       # ম্যানুয়ালিও চালাতে পারবে

jobs:
  incremental_index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GH_TOKEN }}   # ✅ GH_TOKEN দিয়ে checkout করো

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install chromadb sentence-transformers requests

      - name: Restore ChromaDB Cache
        id: chroma-cache
        uses: actions/cache/restore@v4
        with:
          path: ./chroma_db
          key: chromadb-${{ runner.os }}-${{ hashFiles('datasets/**/*.jsonl') }}
          restore-keys: chromadb-${{ runner.os }}-

      - name: Incremental Index New Files
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python incremental_index.py

      - name: Save ChromaDB Cache
        if: ${{ steps.chroma-cache.outputs.cache-hit != 'true' }}   # ✅ আগে cache hit হলে সেভ করবে না
        uses: actions/cache/save@v4
        with:
          path: ./chroma_db
          key: ${{ steps.chroma-cache.outputs.cache-primary-key }}

      - name: Commit Updated Tracker
        run: |
          git config user.name 'Nobab_AI_Bot'
          git config user.email 'bot@nobab.ai'
          git add indexed_files.json
          if git diff --staged --quiet; then
            echo "ℹ️ কোনো নতুন ফাইল নেই"
          else
            git commit -m "🔄 ট্র্যাকার আপডেট: $(date +'%Y-%m-%d')"
            git push
          fi
