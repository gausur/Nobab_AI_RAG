name: Nobab AI All Human Sources

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install tqdm requests biopython
      - name: Run fetcher
        run: python human_fetcher.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add datasets/human_particle/
          git diff --staged --quiet || git commit -m "Auto update $(date -u '+%Y-%m-%d %H:%M:%S')"
          git push
