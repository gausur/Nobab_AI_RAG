name: Universal Dataset Ingester
on:
  schedule:
    - cron: '0 */3 * * *'   # প্রতি ৩ ঘণ্টায়
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install -r requirements_rag.txt
      - name: Run Universal Ingester
        run: python universal_ingester.py
      - name: Commit Data Files
        run: |
          git config user.name 'Nobab_AI_Bot'
          git config user.email 'bot@nobab.ai'
          git add datasets/raw_*/ source_progress.json
          if git diff --staged --quiet; then echo "ℹ️ No changes"; else git commit -m "📥 Raw data batch $(date +%Y-%m-%d)" && git push; fi
