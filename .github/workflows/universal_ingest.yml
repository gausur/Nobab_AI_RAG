name: Universal Dataset Ingester
on:
  schedule: [{cron: '0 2 * * 0'}]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.10'}
      - name: Install
        run: pip install requests
      - name: Ingest All Domains
        run: python universal_ingester.py
      - name: Index & Push
        run: |
          pip install chromadb sentence-transformers
          python incremental_index.py
          git config user.name 'Nobab_AI_Bot'
          git config user.email 'bot@nobab.ai'
          git add datasets/
          git diff --staged --quiet || (git commit -m "🌐 Universal ingest $(date +%Y-%m-%d)" && git push)
