name: RAG Index & Test
on:
  workflow_dispatch:
    inputs:
      question:
        description: 'Your question'
        required: true
      dataset_files:
        description: 'Dataset files to index (e.g., H.jsonl or *.jsonl)'
        required: false
        default: 'H.jsonl'

jobs:
  rag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements_rag.txt
      - name: Index Dataset
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python cyber_rag.py --index "${{ github.event.inputs.dataset_files }}"
      - name: Ask Question
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python cyber_rag.py --ask "${{ github.event.inputs.question }}"
