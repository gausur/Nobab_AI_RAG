name: RAG Index & Test
on:
  workflow_dispatch:
    inputs:
      command:
        description: '--index or --ask'
        required: true
        default: '--index'
      question:
        description: 'Your question'
        required: false
        default: 'How to defend against Feodo C2?'

jobs:
  rag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements_rag.txt
      - name: Run RAG
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python cyber_rag.py ${{ github.event.inputs.command }} "${{ github.event.inputs.question }}"
