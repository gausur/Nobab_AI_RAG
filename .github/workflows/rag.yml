name: RAG Index & Test
on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Command: --index or --ask'
        required: true
        default: '--index'
      question:
        description: 'Your question (only for --ask)'
        required: false
        default: ''

jobs:
  rag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements_rag.txt
      - name: Run Index
        if: ${{ github.event.inputs.command == '--index' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python cyber_rag.py --index
      - name: Run Ask
        if: ${{ github.event.inputs.command == '--ask' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python cyber_rag.py --ask "${{ github.event.inputs.question }}"
