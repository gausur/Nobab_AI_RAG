name: Master Dataset Collector
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install
        run: pip install requests datasets
      - name: Collect All
        run: python master_collector.py
      - name: Index
        run: python incremental_index.py
      - name: Push
        run: |
          git config user.name 'Nobab_AI_Bot'
          git config user.email 'bot@nobab.ai'
          git add datasets/
          if git diff --staged --quiet; then echo "ℹ️ no new"; else git commit -m "📥 Master collect $(date +%Y-%m-%d)" && git push; fi
